# Production override: run with
# docker compose -f docker-compose.yml -f /path/to/this-file up -d --build
# Keeps GEORank's gateway off the public interface; the host Nginx proxy owns TLS.
services:
  traefik:
    ports:
      - "127.0.0.1:${GEORANK_HTTP_PORT:-18080}:80"
      - "127.0.0.1:${GEORANK_HTTPS_PORT:-18443}:443"
