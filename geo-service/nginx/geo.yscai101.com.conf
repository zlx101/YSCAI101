# Install as /etc/nginx/sites-available/geo.yscai101.com.conf, then enable it.
# The TLS certificate paths assume Certbot; adapt them to the actual certificate manager.
server {
    listen 80;
    listen [::]:80;
    server_name geo.yscai101.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name geo.yscai101.com;

    ssl_certificate /etc/letsencrypt/live/geo.yscai101.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/geo.yscai101.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
    }
}
